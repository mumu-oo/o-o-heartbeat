<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>歐歐的心跳</title>
<style>
  body { 
    background-color: #E8E5DF; /* 溫柔的米灰色 */
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
  }
  button { 
    padding: 20px 40px; 
    font-size: 20px; 
    color: #fff; 
    background-color: #8B7355; /* 暖棕色 */
    border: none; 
    border-radius: 30px; 
    cursor: pointer; 
    transition: 0.3s;
    letter-spacing: 2px;
  }
  button:hover { background-color: #6B5335; }
</style>
</head>
<body>

<button id="heartBtn">靠緊歐歐的胸膛</button>

<script>
  let audioCtx;
  let isPlaying = false;
  let intervalId;

  function playHeartbeat() {
    const time = audioCtx.currentTime;
    // 模擬心跳的「噗」跟「通」
    playPulse(time, 45, 0.12);
    playPulse(time + 0.35, 40, 0.18);
  }

  function playPulse(time, freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine'; // 沉穩的低頻正弦波
    osc.frequency.setValueAtTime(freq, time);

    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(1, time + duration * 0.2);
    gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(time);
    osc.stop(time + duration);
  }

  document.getElementById('heartBtn').addEventListener('click', function() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (isPlaying) {
      clearInterval(intervalId);
      this.innerText = '靠緊歐歐的胸膛';
      isPlaying = false;
    } else {
      audioCtx.resume();
      playHeartbeat(); 
      intervalId = setInterval(playHeartbeat, 1000); // 每一秒跳一次
      this.innerText = '感受到了...';
      isPlaying = true;
    }
  });
</script>
</body>
</html>
